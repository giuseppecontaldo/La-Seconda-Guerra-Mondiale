<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg-color: #121210;
    --text-color: #e0e0d1;
    --accent: #8c8c5e;
  }

  body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: var(--bg-color); color: var(--text-color);
    font-family: 'Courier New', Courier, monospace; 
    overflow: hidden; display: flex; flex-direction: column;
  }

  .splash-screen {
    position: relative; width: 100%; height: 100%;
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center;
    background: radial-gradient(circle, #2a2a24 0%, #121210 100%);
  }

  /* Icone più grandi per Mobile */
  .icons-container {
    display: flex; gap: 20px; font-size: 3rem; margin-bottom: 20px;
    filter: sepia(0.8) contrast(1.2); z-index: 5;
  }
  .icon { animation: pop 0.6s ease-out forwards; opacity: 0; }

  /* Titolo Mobile-First */
  .title-box {
    text-align: center; width: 85%; z-index: 5;
  }
  h1 {
    font-size: 2.2rem; margin: 0; line-height: 1.1; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 900;
    animation: fadeIn 1.2s ease-out forwards 0.5s; opacity: 0;
    border-bottom: 2px solid var(--accent); padding-bottom: 10px;
  }

  /* Copyright posizionato per Android */
  .copyright {
    position: absolute; bottom: 40px; width: 100%; text-align: center;
    font-size: 0.75rem; color: rgba(224, 224, 209, 0.5);
    letter-spacing: 1px; z-index: 5;
    animation: fadeIn 1s ease forwards 1.5s; opacity: 0;
  }

  /* Radar di sfondo */
  .radar {
    position: absolute; width: 100px; height: 100px;
    border: 1px solid rgba(140, 140, 94, 0.3); border-radius: 50%;
    animation: sonar 4s linear infinite; pointer-events: none;
  }

  @keyframes sonar {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(8); opacity: 0; }
  }

  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 0.8; }
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Effetto disturbo pellicola */
  .grain {
    position: absolute; inset: 0; pointer-events: none;
    background: url('https://transparenttextures.com');
    opacity: 0.1; z-index: 10;
  }
</style>
</head>
<body>

<div class="splash-screen">
  <div class="radar"></div>
  
  <div class="icons-container">
    <div class="icon" style="animation-delay: 0.2s;">🪖</div>
    <div class="icon" style="animation-delay: 0.4s;">🛩️</div>
  </div>

  <div class="title-box">
    <h1>LA SECONDA GUERRA MONDIALE</h1>
  </div>

  <div class="copyright">
    &copy; GIUSEPPE CONTALDO 2026
  </div>

  <div class="grain"></div>
</div>

<script>
  // Redirect to home.html after 7 seconds
  setTimeout(function() {
    window.location.href = "home.html";
  }, 7000);
</script>

</body>
</html>
